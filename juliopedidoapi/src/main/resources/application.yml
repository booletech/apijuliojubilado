spring:
  application:
    name: juliopedidoapi
  profiles:
    default: dev
  datasource:
    url: jdbc:sqlserver://${DB_HOST:127.0.0.1}:${DB_PORT:1433};databaseName=${DB_NAME:julio_dev};encrypt=${DB_ENCRYPT:true};trustServerCertificate=${DB_TRUST_SERVER_CERTIFICATE:true}
    username: ${DB_APP_USERNAME:${DB_USERNAME:sa}}
    password: ${DB_APP_PASSWORD:${DB_PASSWORD:SenhaForte@123}}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
    open-in-view: false
  data:
    web:
      pageable:
        default-page-size: 10

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

api:
  viacep:
    url: ${VIACEP_API_URL:https://viacep.com.br/}
  fipe:
    url: ${FIPE_API_URL:https://fipe.parallelum.com.br/api/v2}

juliopedidoapi:
  url: ${JULIOPEDIDOAPI_URL:http://localhost:8080}

elasticsearch:
  url: ${ELASTICSEARCH_URL:http://localhost:9200}
  index:
    pedido: ${ELASTICSEARCH_PEDIDO_INDEX:pedido}

security:
  jwt:
    issuer: ${JWT_ISSUER:JulioApis}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
    secret: ${JWT_SECRET:CHAVE_SUPER_SECRETA_JULIO_APIS_COM_NO_MINIMO_32_CARACTERES}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,https://localhost:5173}
  auth:
    users:
      admin:
        username: ${PEDIDO_API_ADMIN_USERNAME:admin}
        password: ${PEDIDO_API_ADMIN_PASSWORD:admin123}
      supervisor:
        username: ${PEDIDO_API_SUPERVISOR_USERNAME:supervisor}
        password: ${PEDIDO_API_SUPERVISOR_PASSWORD:supervisor123}
      funcionario:
        username: ${PEDIDO_API_FUNCIONARIO_USERNAME:funcionario}
        password: ${PEDIDO_API_FUNCIONARIO_PASSWORD:funcionario123}
      totem:
        username: ${PEDIDO_API_TOTEM_USERNAME:totem}
        password: ${PEDIDO_API_TOTEM_PASSWORD:totem123}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
  prometheus:
    metrics:
      export:
        enabled: true
