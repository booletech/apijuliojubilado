spring:
  application:
    name: JulioJubiladoapi
  profiles:
    default: dev
  datasource:
    url: jdbc:sqlserver://${DB_HOST:127.0.0.1}:${DB_PORT:1433};databaseName=${DB_NAME:julio_dev};encrypt=${DB_ENCRYPT:true};trustServerCertificate=${DB_TRUST_SERVER_CERTIFICATE:true}
    username: ${DB_APP_USERNAME:${DB_USERNAME:sa}}
    password: ${DB_APP_PASSWORD:${DB_PASSWORD:SenhaForte@123}}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
    open-in-view: false

server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

juliopedidoapi:
  url: ${JULIOPEDIDOAPI_URL:http://localhost:8080}
  service-subject: ${JULIOPEDIDOAPI_SERVICE_SUBJECT:service-juliopedidoapi}

elasticsearch:
  url: ${ELASTICSEARCH_URL:http://localhost:9200}

feign:
  client:
    config:
      default:
        loggerLevel: FULL

logging:
  level:
    org.springframework.cloud.openfeign: DEBUG
    feign: DEBUG

feature:
  remoteCalls:
    enabled: true
  fileLoaders:
    enabled: true

security:
  jwt:
    issuer: ${JWT_ISSUER:JulioApis}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
    secret: ${JWT_SECRET:CHAVE_SUPER_SECRETA_JULIO_APIS_COM_NO_MINIMO_32_CARACTERES}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,https://localhost:5173}
  seed:
    default-users: ${APP_SEED_DEFAULT_USERS:true}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
  prometheus:
    metrics:
      export:
        enabled: true
