apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devops-trabalho

resources:
  - namespace.yaml
  - infra/sqlserver-pv.yaml
  - infra/sqlserver-pvc.yaml
  - infra/sqlserver.yaml
  - infra/sqlserver-init-job.yaml
  - infra/flyway-migrate-job.yaml
  - infra/elasticsearch.yaml
  - apps/frontend.yaml
  - apps/juliopedidoapi.yaml
  - apps/juliojubiladoapi.yaml
  - monitoring/prometheus-rbac.yaml
  - monitoring/prometheus-pv.yaml
  - monitoring/prometheus-pvc.yaml
  - monitoring/prometheus.yaml
  - monitoring/kube-state-metrics.yaml
  - monitoring/grafana.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: sqlserver-bootstrap-sql
    files:
      - infra/sql/01_bootstrap_environment.sql
  - name: flyway-sql
    files:
      - infra/sql/V1__baseline_shared_schema.sql
  - name: app-config
    literals:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_NAME=julio_dev
      - DB_ENCRYPT=true
      - DB_TRUST_SERVER_CERTIFICATE=true
      - JULIOPEDIDOAPI_URL=http://juliopedidoapi:8080
      - JULIOPEDIDOAPI_SERVICE_SUBJECT=service-juliopedidoapi
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_PEDIDO_INDEX=pedido
      - JWT_ISSUER=JulioApis
      - JWT_EXPIRATION_MINUTES=60
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost:30080,http://127.0.0.1:30080
      - APP_SEED_DEFAULT_USERS=true
      - VIACEP_API_URL=https://viacep.com.br/
      - FIPE_API_URL=https://fipe.parallelum.com.br/api/v2
      - PEDIDO_API_ADMIN_USERNAME=admin
      - PEDIDO_API_SUPERVISOR_USERNAME=supervisor
      - PEDIDO_API_FUNCIONARIO_USERNAME=funcionario
      - PEDIDO_API_TOTEM_USERNAME=totem
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx192m
  - name: deployment-images
    envs:
      - runtime/deploy.env
  - name: prometheus-config
    files:
      - monitoring/prometheus.yml
  - name: grafana-datasources
    files:
      - monitoring/grafana/datasources/prometheus-datasource.yml
  - name: grafana-dashboard-provider
    files:
      - monitoring/grafana/dashboards/dashboard-provider.yml
  - name: grafana-dashboard-julio
    files:
      - monitoring/grafana/dashboards/julio-observability.json

secretGenerator:
  - name: app-secrets
    envs:
      - runtime/runtime.env

replacements:
  - source:
      kind: ConfigMap
      name: deployment-images
      fieldPath: data.FRONTEND_IMAGE
    targets:
      - select:
          kind: Deployment
          name: frontend
        fieldPaths:
          - spec.template.spec.containers.[name=app].image
  - source:
      kind: ConfigMap
      name: deployment-images
      fieldPath: data.JULIOJUBILADOAPI_IMAGE
    targets:
      - select:
          kind: Deployment
          name: juliojubiladoapi
        fieldPaths:
          - spec.template.spec.containers.[name=app].image
  - source:
      kind: ConfigMap
      name: deployment-images
      fieldPath: data.JULIOPEDIDOAPI_IMAGE
    targets:
      - select:
          kind: Deployment
          name: juliopedidoapi
        fieldPaths:
          - spec.template.spec.containers.[name=app].image
