apiVersion: v1
kind: Service
metadata:
  name: juliopedidoapi
  labels:
    app.kubernetes.io/name: juliopedidoapi
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: juliopedidoapi
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: juliopedidoapi
  labels:
    app.kubernetes.io/name: juliopedidoapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: juliopedidoapi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: juliopedidoapi
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8080"
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: juliopedidoapi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: juliopedidoapi
                topologyKey: kubernetes.io/hostname
      containers:
        - name: app
          image: docker.io/example/juliopedidoapi:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: juliopedidoapi
  labels:
    app.kubernetes.io/name: juliopedidoapi
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: juliopedidoapi
