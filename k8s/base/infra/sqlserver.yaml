apiVersion: v1
kind: Service
metadata:
  name: sqlserver
  labels:
    app.kubernetes.io/name: sqlserver
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sqlserver
  ports:
    - name: sql
      port: 1433
      targetPort: 1433
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqlserver
  labels:
    app.kubernetes.io/name: sqlserver
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: sqlserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sqlserver
    spec:
      securityContext:
        fsGroup: 10001
      initContainers:
        - name: init-sqlserver-volume
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              mkdir -p /var/opt/mssql
              chown -R 10001:10001 /var/opt/mssql
              chmod -R 770 /var/opt/mssql
          volumeMounts:
            - name: sqlserver-data
              mountPath: /var/opt/mssql
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/mssql/server:2022-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1433
              name: sql
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_PID
              value: Developer
            - name: MSSQL_MEMORY_LIMIT_MB
              value: "768"
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SQLSERVER_SA_PASSWORD
          volumeMounts:
            - name: sqlserver-data
              mountPath: /var/opt/mssql
          startupProbe:
            tcpSocket:
              port: 1433
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 1433
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 1433
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: sqlserver-data
          persistentVolumeClaim:
            claimName: sqlserver-data
